server {
    listen 80;
    server_name localhost;

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    # Health check
    location /health {
        set $upstream http://recipts-server:8181;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API proxy
    location /api/ {
        set $upstream http://recipts-server:8181;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Allow large image uploads (base64-encoded full-res photos can be 4–6MB)
        client_max_body_size 50m;

        # Increase buffer sizes for large image responses
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 512k;

        # Increase timeout for AI processing
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Default — return simple status page
    location / {
        return 200 "Receipt Tracker API\n";
        add_header Content-Type text/plain;
    }
}
